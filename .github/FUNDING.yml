# Concord Voice — organization-wide funding links.
# Renders a "Sponsor" button on any repository that doesn't define its own FUNDING file.
# Kickstarter is not a natively supported platform key, so it goes under `custom`.

custom:
  - "https://www.kickstarter.com/projects/concord-mark/concord-voice"  # pre-launch page (follow/notify until the campaign is live)
  - "https://www.concordvoice.com"
