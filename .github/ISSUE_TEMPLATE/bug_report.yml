name: Bug report
description: Report a problem with a Concord Voice product
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.
        **For security vulnerabilities, do not use this form.** See our [Security Policy](https://github.com/Concord-Voice/.github/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop (macOS)
        - Desktop (Windows)
        - Desktop (Linux)
        - Web
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App / build version
      placeholder: "e.g. v0.1.0-Alpha"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs or drag in screenshots. **Redact personal info and tokens.**
      render: shell
